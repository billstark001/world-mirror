name: Publish to Modrinth

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.2.0)'
        required: true
        type: string
      release_channel:
        description: 'Release channel'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - beta
          - alpha
      changelog:
        description: 'Changelog text (leave empty to use CHANGELOG.md)'
        required: false
        type: string

jobs:
  publish-modrinth:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build

      - name: Read CHANGELOG.md (fallback changelog)
        id: read_changelog
        if: ${{ inputs.changelog == '' }}
        run: |
          # Extract the first release section from CHANGELOG.md
          CHANGELOG=$(awk '/^## \[/{found++} found==1{print} found==2{exit}' CHANGELOG.md)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: build/libs/world-mirror-${{ inputs.version }}+*.jar
          name: World Mirror ${{ inputs.version }}
          version: ${{ inputs.version }}
          version-type: ${{ inputs.release_channel }}
          changelog: ${{ inputs.changelog || steps.read_changelog.outputs.changelog }}
          game-versions: |
            1.21.11
          loaders: |
            fabric
          dependencies: |
            fabric-api | required
