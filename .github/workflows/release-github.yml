name: Publish to GitHub Releases

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to create (e.g. v0.2.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean
      changelog:
        description: 'Release notes (leave empty to use CHANGELOG.md)'
        required: false
        type: string

jobs:
  publish-github:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ (github.base_ref || github.ref_name) == 'mc/1.21.11' && '21' || '25' }}
          distribution: 'microsoft'

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build

      - name: Read CHANGELOG.md (fallback release notes)
        id: read_changelog
        if: ${{ inputs.changelog == '' }}
        run: |
          # Extract the first release section from CHANGELOG.md
          CHANGELOG=$(awk '/^## \[/{found++} found==1{print} found==2{exit}' CHANGELOG.md)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: World Mirror ${{ inputs.version }}
          body: ${{ inputs.changelog || steps.read_changelog.outputs.changelog }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            build/libs/world-mirror-*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
